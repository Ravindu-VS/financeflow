<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FinanceFlow</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages - redirect to index with path encoded
      (function() {
        var repo = '/financeflow';
        var loc = window.location;
        var path = loc.pathname.replace(repo, '').replace(/^\/+/, '');
        var search = loc.search ? '&' + loc.search.slice(1).replace(/&/g, '~and~') : '';
        var hash = loc.hash || '';
        
        if (path) {
          loc.replace(loc.protocol + '//' + loc.host + repo + '/?p=' + path.replace(/&/g, '~and~') + search + hash);
        } else {
          loc.replace(loc.protocol + '//' + loc.host + repo + '/');
        }
      })();
    </script>
  </head>
  <body>
  </body>
</html>
